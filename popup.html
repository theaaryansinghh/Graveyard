<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graveyard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap');

  :root {
    --bg:        #080808;
    --surface:   #0f0f0f;
    --stone:     #1a1a1a;
    --border:    #222222;
    --fog:       #2a2a2a;
    --text:      #c8c8c0;
    --dim:       #555550;
    --epitaph:   #888880;
    --white:     #e8e8e0;
    --dead:      #4a4a44;
    --red:       #8b2020;
    --red-glow:  #c0392b;
    --green:     #2d5a27;
    --green-glow:#4a9e42;
    --blue:      #1a3a5c;
    --blue-glow: #4a8ab5;
    --amber:     #5a3a10;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 360px;
    min-height: 500px;
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier Prime', monospace;
    font-size: 12px;
    position: relative;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse at 20% 80%, rgba(255,255,255,0.015) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(255,255,255,0.01) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  .header {
    padding: 20px 18px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
  }

  .logo-block { display: flex; flex-direction: column; gap: 2px; }

  .logo-title {
    font-family: 'UnifrakturMaguntia', cursive;
    font-size: 26px;
    color: var(--white);
    letter-spacing: 1px;
    line-height: 1;
    text-shadow: 0 0 20px rgba(255,255,255,0.08);
  }

  .logo-sub {
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 3px;
    text-transform: uppercase;
    font-style: italic;
  }

  .header-actions { display: flex; gap: 6px; padding-top: 4px; }

  .btn-icon {
    width: 26px; height: 26px;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--dim);
    cursor: pointer;
    font-size: 12px;
    display: flex; align-items: center; justify-content: center;
    transition: all .2s;
  }
  .btn-icon:hover { border-color: var(--epitaph); color: var(--text); }

  .proxy-warn {
    margin: 10px 16px;
    padding: 8px 12px;
    background: var(--stone);
    border: 1px solid var(--amber);
    border-left: 3px solid #8b5e20;
    font-size: 10px;
    color: #a07840;
    line-height: 1.6;
    display: none;
    font-style: italic;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 18px;
    margin: 14px 0 10px;
  }
  .divider-line { flex: 1; height: 1px; background: var(--border); }
  .divider-text { font-size: 9px; color: var(--dead); letter-spacing: 2px; text-transform: uppercase; }

  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    padding: 0 16px;
  }

  .stat {
    background: var(--stone);
    border: 1px solid var(--border);
    padding: 10px 6px 8px;
    text-align: center;
    cursor: pointer;
    transition: all .2s;
    position: relative;
    overflow: hidden;
  }

  .stat::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: transparent;
    transition: background .2s;
  }

  .stat:hover { border-color: var(--fog); }
  .stat.total.active::after    { background: var(--epitaph); }
  .stat.rejected.active::after { background: var(--red-glow); }
  .stat.interview.active::after{ background: var(--blue-glow); }
  .stat.offer.active::after    { background: var(--green-glow); }

  .stat-count {
    font-size: 24px;
    font-weight: 700;
    font-family: 'Courier Prime', monospace;
    line-height: 1;
    margin-bottom: 5px;
  }
  .stat-label { font-size: 8px; color: var(--dim); letter-spacing: 1.5px; text-transform: uppercase; }

  .stat.total     .stat-count { color: var(--epitaph); }
  .stat.rejected  .stat-count { color: var(--red-glow);   text-shadow: 0 0 8px rgba(192,57,43,0.4); }
  .stat.interview .stat-count { color: var(--blue-glow);  text-shadow: 0 0 8px rgba(74,138,181,0.3); }
  .stat.offer     .stat-count { color: var(--green-glow); text-shadow: 0 0 8px rgba(74,158,66,0.3); }

  .list-header {
    padding: 0 18px 8px;
    display: flex; align-items: center; justify-content: space-between;
  }

  .email-list {
    padding: 0 16px;
    max-height: 220px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .email-list::-webkit-scrollbar { width: 2px; }
  .email-list::-webkit-scrollbar-thumb { background: var(--border); }

  .email-card {
    background: var(--stone);
    border: 1px solid var(--border);
    border-left: 2px solid transparent;
    padding: 8px 10px;
    display: flex;
    align-items: center;
    gap: 10px;
    animation: rise .25s ease;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(3px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .email-card.card-rejected  { border-left-color: var(--red); }
  .email-card.card-interview { border-left-color: var(--blue-glow); }
  .email-card.card-offer     { border-left-color: var(--green-glow); }
  .email-card.card-ack       { border-left-color: var(--dead); }
  .email-card.card-unknown   { border-left-color: var(--border); }

  .email-info { flex: 1; min-width: 0; }

  .email-company {
    font-size: 11.5px;
    font-weight: 700;
    color: var(--white);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .email-subject {
    font-size: 10px;
    color: var(--dim);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-top: 2px;
    font-style: italic;
  }

  .email-meta { text-align: right; flex-shrink: 0; }
  .email-date { font-size: 9px; color: var(--dead); }

  .status-chip {
    font-size: 8.5px;
    font-weight: 700;
    padding: 1px 5px;
    margin-top: 3px;
    display: inline-block;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .chip-rejected  { color: var(--red-glow);   background: rgba(139,32,32,0.15); }
  .chip-interview { color: var(--blue-glow);  background: rgba(26,58,92,0.3); }
  .chip-offer     { color: var(--green-glow); background: rgba(45,90,39,0.2); }
  .chip-ack       { color: var(--dead); border: 1px solid var(--border); }
  .chip-unknown   { color: var(--dead); border: 1px solid var(--border); }

  .empty { padding: 36px 20px; text-align: center; }
  .empty-symbol {
    font-family: 'UnifrakturMaguntia', cursive;
    font-size: 38px;
    color: var(--border);
    margin-bottom: 10px;
    display: block;
  }
  .empty-text { font-size: 11px; color: var(--dead); line-height: 1.7; font-style: italic; }

  .footer {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    margin-top: 14px;
  }

  .btn {
    flex: 1;
    padding: 8px;
    border-radius: 2px;
    border: 1px solid var(--border);
    font-family: 'Courier Prime', monospace;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all .2s;
  }

  .btn-primary { background: var(--stone); color: var(--text); border-color: var(--fog); }
  .btn-primary:hover { background: var(--fog); color: var(--white); border-color: var(--epitaph); }
  .btn-primary:disabled { opacity: .3; cursor: not-allowed; }
  .btn-secondary { background: transparent; color: var(--dead); }
  .btn-secondary:hover { color: var(--red-glow); border-color: var(--red); }

  #settings-panel { display: none; padding: 16px 18px; animation: rise .2s ease; }

  .settings-title {
    font-family: 'UnifrakturMaguntia', cursive;
    font-size: 18px;
    color: var(--epitaph);
    margin-bottom: 16px;
  }

  .field { margin-bottom: 12px; }
  .field label {
    display: block;
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--dead);
    margin-bottom: 5px;
  }
  .field input {
    width: 100%;
    padding: 7px 10px;
    background: var(--stone);
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text);
    font-family: 'Courier Prime', monospace;
    font-size: 12px;
    outline: none;
    transition: border-color .15s;
  }
  .field input:focus { border-color: var(--epitaph); }
  .field input::placeholder { color: var(--dead); font-style: italic; }

  .field-row { display: flex; gap: 8px; }
  .field-row .field { flex: 1; }

  .save-msg { font-size: 10px; color: var(--green-glow); text-align: center; margin-top: 6px; height: 14px; font-style: italic; }

  .spin { animation: spin 1.2s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<script>
  chrome.storage.local.get('graveyard_theme', d => {
    if (d.graveyard_theme === 'light') window.location.replace('popup2.html');
  });
</script>

<div class="header">
  <div class="logo-block">
    <div class="logo-title">Graveyard</div>
    <div class="logo-sub">application obituaries</div>
  </div>
  <div class="header-actions">
    <button class="btn-icon" id="settings-btn" title="Settings">⚙</button>
    <button class="btn-icon" id="export-btn" title="Export CSV">↓</button>
  </div>
</div>

<div class="proxy-warn" id="proxy-warn">
  ⚠ proxy offline — run <code>node proxy/server.js</code> to connect
</div>

<div id="dashboard">
  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-text">the count</div>
    <div class="divider-line"></div>
  </div>

  <div class="stats">
    <div class="stat total active" data-filter="all">
      <div class="stat-count" id="count-total">0</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat rejected" data-filter="rejected">
      <div class="stat-count" id="count-rejected">0</div>
      <div class="stat-label">Buried</div>
    </div>
    <div class="stat interview" data-filter="interview">
      <div class="stat-count" id="count-interview">0</div>
      <div class="stat-label">Alive</div>
    </div>
    <div class="stat offer" data-filter="offer">
      <div class="stat-count" id="count-offer">0</div>
      <div class="stat-label">Risen</div>
    </div>
  </div>

  <div class="divider" style="margin-top:14px;">
    <div class="divider-line"></div>
    <div class="divider-text" id="list-label">recent</div>
    <div class="divider-line"></div>
  </div>

  <div class="email-list" id="email-list">
    <div class="empty">
      <span class="empty-symbol">⸸</span>
      <div class="empty-text">no souls found yet.<br>press scan to begin the count.</div>
    </div>
  </div>

  <div class="footer">
    <button class="btn btn-secondary" id="clear-btn">Exhume All</button>
    <button class="btn btn-primary" id="scan-btn">Scan Now</button>
  </div>
</div>

<div id="settings-panel">
  <div class="settings-title">Configure</div>
  <div class="field">
    <label>IMAP Host</label>
    <input type="text" id="cfg-host" placeholder="imap.gmail.com" />
  </div>
  <div class="field-row">
    <div class="field">
      <label>Port</label>
      <input type="number" id="cfg-port" placeholder="993" value="993" />
    </div>
    <div class="field">
      <label>TLS</label>
      <input type="text" id="cfg-tls" placeholder="yes" value="yes" />
    </div>
  </div>
  <div class="field">
    <label>Email Address</label>
    <input type="email" id="cfg-user" placeholder="you@gmail.com" />
  </div>
  <div class="field">
    <label>App Password</label>
    <input type="password" id="cfg-pass" placeholder="••••••••••••••••" />
  </div>
  <div class="theme-toggle" style="margin-top:16px; padding-top:14px; border-top:1px solid var(--border); display:flex; align-items:center; justify-content:space-between;">
    <span style="font-size:10px; color:var(--dead); letter-spacing:1px; text-transform:uppercase;">Theme</span>
    <button id="theme-switch-btn" style="font-size:10px; padding:3px 10px; border-radius:3px; border:1px solid var(--border); background:transparent; color:var(--epitaph); cursor:pointer; font-family:'Courier Prime',monospace; letter-spacing:1px;">Light →</button>
  </div>

  <div class="save-msg" id="save-msg"></div>
  <div class="footer" style="margin-top:8px; padding:0;">
    <button class="btn btn-secondary" id="cancel-settings">Cancel</button>
    <button class="btn btn-primary" id="save-settings">Save</button>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
