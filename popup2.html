<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graveyard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&display=swap');

  :root {
    --bg:       #faf9f7;
    --surface:  #ffffff;
    --border:   #eeece8;
    --border2:  #e0ddd8;
    --text:     #2d2b28;
    --muted:    #8c8880;
    --faint:    #b8b4ae;
    --red:      #b85450;
    --red-bg:   #fdf5f5;
    --green:    #4a8c6a;
    --green-bg: #f2faf6;
    --blue:     #4a7ab5;
    --blue-bg:  #f0f5fc;
    --gray-bg:  #f7f6f4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 360px;
    min-height: 500px;
    background: var(--bg);
    color: var(--text);
    font-family: 'Geist', -apple-system, sans-serif;
    font-size: 13px;
  }

  .header {
    padding: 16px 18px 14px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo { display: flex; align-items: center; gap: 8px; }
  .logo-mark { font-size: 15px; line-height: 1; opacity: 0.7; }
  .logo-name {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: -0.2px;
  }

  .header-actions { display: flex; gap: 5px; }

  .btn-icon {
    width: 28px; height: 28px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--faint);
    cursor: pointer;
    font-size: 12px;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s;
  }
  .btn-icon:hover { background: var(--bg); border-color: var(--border2); color: var(--muted); }

  /* export btn override */
  #export-btn {
    font-size: 10px;
    font-weight: 500;
    font-family: inherit;
    letter-spacing: 0.3px;
    width: auto;
    padding: 0 10px;
    color: var(--muted);
    gap: 4px;
  }
  #export-btn:hover { color: var(--text); }

  .proxy-warn {
    margin: 10px 14px;
    padding: 8px 12px;
    background: #fffdf0;
    border: 1px solid #f0e0a0;
    border-radius: 6px;
    font-size: 11px;
    color: #8a6a20;
    display: none;
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 7px;
    padding: 14px;
  }

  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 6px;
    text-align: center;
    cursor: pointer;
    transition: all .15s;
  }

  .stat:hover { border-color: var(--border2); background: var(--gray-bg); }
  .stat.active { border-color: transparent; }
  .stat.total.active     { background: var(--gray-bg);  border-color: var(--border2); }
  .stat.rejected.active  { background: var(--red-bg);   border-color: #e8b8b5; }
  .stat.interview.active { background: var(--blue-bg);  border-color: #b8d0e8; }
  .stat.offer.active     { background: var(--green-bg); border-color: #a8d0b8; }

  .stat-count {
    font-size: 22px;
    font-weight: 500;
    line-height: 1;
    margin-bottom: 4px;
    letter-spacing: -0.5px;
  }

  .stat-label {
    font-size: 9px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--faint);
  }

  .stat.total    .stat-count { color: var(--text); }
  .stat.rejected .stat-count { color: var(--red); }
  .stat.interview .stat-count { color: var(--blue); }
  .stat.offer    .stat-count { color: var(--green); }

  .section-header {
    padding: 0 14px 8px;
    display: flex; align-items: center; justify-content: space-between;
  }

  .section-title {
    font-size: 10.5px;
    font-weight: 500;
    color: var(--faint);
    text-transform: uppercase;
    letter-spacing: 0.6px;
  }

  .email-list {
    padding: 0 14px;
    max-height: 230px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .email-list::-webkit-scrollbar { width: 2px; }
  .email-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }

  .email-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 9px 11px;
    display: flex;
    align-items: center;
    gap: 10px;
    animation: fadeUp .2s ease;
    transition: border-color .15s;
  }
  .email-card:hover { border-color: var(--border2); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(3px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .status-bar {
    width: 2px;
    height: 28px;
    border-radius: 2px;
    flex-shrink: 0;
    opacity: 0.7;
  }
  .bar-rejected  { background: var(--red); }
  .bar-interview { background: var(--blue); }
  .bar-offer     { background: var(--green); }
  .bar-ack       { background: var(--border2); }
  .bar-unknown   { background: var(--border2); }

  .email-info { flex: 1; min-width: 0; }

  .email-company {
    font-size: 12.5px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .email-subject {
    font-size: 11px;
    color: var(--faint);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-top: 2px;
  }

  .email-meta { text-align: right; flex-shrink: 0; }
  .email-date { font-size: 9.5px; color: var(--faint); }

  .status-chip {
    font-size: 9px;
    font-weight: 500;
    padding: 2px 6px;
    border-radius: 4px;
    margin-top: 3px;
    display: inline-block;
    letter-spacing: 0.2px;
  }

  .chip-rejected  { background: var(--red-bg);   color: var(--red); }
  .chip-interview { background: var(--blue-bg);  color: var(--blue); }
  .chip-offer     { background: var(--green-bg); color: var(--green); }
  .chip-ack       { background: var(--gray-bg);  color: var(--faint); }
  .chip-unknown   { background: var(--gray-bg);  color: var(--faint); }

  .empty { padding: 40px 20px; text-align: center; }
  .empty-icon { font-size: 26px; margin-bottom: 10px; opacity: 0.4; }
  .empty-text { font-size: 12px; line-height: 1.7; color: var(--faint); }

  .footer {
    padding: 12px 14px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    margin-top: 12px;
    background: var(--surface);
  }

  .btn {
    flex: 1;
    padding: 8px;
    border-radius: 7px;
    border: 1px solid var(--border);
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all .15s;
  }

  .btn-primary {
    background: var(--text);
    color: #fff;
    border-color: var(--text);
  }
  .btn-primary:hover { background: #444; }
  .btn-primary:disabled { opacity: .35; cursor: not-allowed; }

  .btn-secondary {
    background: transparent;
    color: var(--faint);
  }
  .btn-secondary:hover { background: var(--bg); color: var(--red); border-color: #e8b8b5; }

  #settings-panel {
    display: none;
    padding: 16px 14px;
    animation: fadeUp .2s ease;
  }

  .settings-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 14px;
  }

  .field { margin-bottom: 11px; }
  .field label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    color: var(--faint);
    margin-bottom: 5px;
  }
  .field input {
    width: 100%;
    padding: 7px 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: inherit;
    font-size: 12.5px;
    outline: none;
    transition: border-color .15s;
  }
  .field input:focus { border-color: #b8d0e8; box-shadow: 0 0 0 3px rgba(74,122,181,0.07); }
  .field input::placeholder { color: var(--faint); }

  .field-row { display: flex; gap: 8px; }
  .field-row .field { flex: 1; }

  .save-msg {
    font-size: 11px;
    color: var(--green);
    text-align: center;
    margin-top: 6px;
    height: 14px;
  }

  .spin { animation: spin 1s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <span class="logo-mark">🪦</span>
    <span class="logo-name">Graveyard</span>
  </div>
  <div class="header-actions">
    <button class="btn-icon" id="settings-btn" title="Settings">⚙</button>
    <button class="btn-icon" id="export-btn" title="Export CSV">Export CSV</button>
  </div>
</div>

<div class="proxy-warn" id="proxy-warn">
  ⚠ Proxy offline — run <code>node proxy/server.js</code>
</div>

<div id="dashboard">
  <div class="stats">
    <div class="stat total active" data-filter="all">
      <div class="stat-count" id="count-total">0</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat rejected" data-filter="rejected">
      <div class="stat-count" id="count-rejected">0</div>
      <div class="stat-label">Rejected</div>
    </div>
    <div class="stat interview" data-filter="interview">
      <div class="stat-count" id="count-interview">0</div>
      <div class="stat-label">Interview</div>
    </div>
    <div class="stat offer" data-filter="offer">
      <div class="stat-count" id="count-offer">0</div>
      <div class="stat-label">Offer</div>
    </div>
  </div>

  <div class="section-header">
    <span class="section-title" id="list-label">Recent</span>
  </div>

  <div class="email-list" id="email-list">
    <div class="empty">
      <div class="empty-icon">📭</div>
      <div class="empty-text">No emails tracked yet.<br>Hit Scan Now to start.</div>
    </div>
  </div>

  <div class="footer">
    <button class="btn btn-secondary" id="clear-btn">Clear All</button>
    <button class="btn btn-primary" id="scan-btn">Scan Now</button>
  </div>
</div>

<div id="settings-panel">
  <div class="settings-title">Settings</div>

  <div class="field">
    <label>IMAP Host</label>
    <input type="text" id="cfg-host" placeholder="imap.gmail.com" />
  </div>
  <div class="field-row">
    <div class="field">
      <label>Port</label>
      <input type="number" id="cfg-port" placeholder="993" value="993" />
    </div>
    <div class="field">
      <label>TLS</label>
      <input type="text" id="cfg-tls" placeholder="yes" value="yes" />
    </div>
  </div>
  <div class="field">
    <label>Email Address</label>
    <input type="email" id="cfg-user" placeholder="you@gmail.com" />
  </div>
  <div class="field">
    <label>Password / App Password</label>
    <input type="password" id="cfg-pass" placeholder="••••••••••••••••" />
  </div>

  <div class="save-msg" id="save-msg"></div>

  <div class="footer" style="margin-top: 10px; padding: 0; background: transparent; border: none;">
    <button class="btn btn-secondary" id="cancel-settings">Cancel</button>
    <button class="btn btn-primary" id="save-settings">Save</button>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
